<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>fauzi@terminal:~$</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--text:#e2e8f0;--cyan:#22d3ee;--red:#f87171;--blue:#60a5fa;--green:#4ade80;--dim:#475569;--glow:rgba(34,211,238,0.15);--prompt-color:#22d3ee}
html,body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code','JetBrains Mono',Consolas,'Courier New',monospace;font-size:14px;line-height:1.6}

/* === DESKTOP: fixed 100vh flex layout === */
#terminal-wrapper{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;padding:12px}
#terminal-header{padding:8px 0;border-bottom:1px solid #1e293b;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.dot{width:12px;height:12px;border-radius:50%}
.dot.r{background:#f87171}.dot.y{background:#fbbf24}.dot.g{background:#4ade80}
#terminal-header span{color:var(--dim);font-size:12px;margin-left:8px}
#output{flex:1;overflow-y:auto;padding:8px 0;scroll-behavior:smooth;word-break:break-word;-webkit-overflow-scrolling:touch}
#output::-webkit-scrollbar{width:4px}
#output::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.line{margin-bottom:2px;white-space:pre-wrap;font-size:13px}
.line.cmd-line .prompt{color:var(--prompt-color);margin-right:4px}
.line.cmd-line .cmd-text{color:var(--text)}
.cyan{color:var(--cyan)}.red{color:var(--red)}.blue{color:var(--blue)}.green{color:var(--green)}.dim{color:var(--dim)}
a,.blue{color:var(--blue);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
.project-link{color:var(--blue);cursor:pointer;text-decoration:underline}
.project-item{cursor:pointer;padding:2px 4px;border-radius:3px;transition:background .15s}
.project-item:hover{background:rgba(34,211,238,0.1)}
.badge{display:inline-block;padding:1px 8px;border-radius:4px;background:rgba(34,211,238,0.15);color:var(--cyan);font-size:12px;margin:2px 2px;border:1px solid rgba(34,211,238,0.3)}
#input-area{display:flex;align-items:center;padding:8px 0;border-top:1px solid #1e293b;margin-top:4px;gap:0;flex-shrink:0}
#prompt{color:var(--prompt-color);white-space:nowrap;margin-right:4px;font-size:13px}
#input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;caret-color:var(--cyan)}
#mobile-cmds{display:none;flex-shrink:0}
#mobile-cmds .cmd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 0}
#mobile-cmds button{background:#1e293b;border:1px solid #334155;color:var(--cyan);padding:10px 4px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;touch-action:manipulation}
#mobile-cmds button:active{background:rgba(34,211,238,0.2);transform:scale(0.96)}
#sound-toggle{position:fixed;top:10px;right:10px;background:#1e293b;border:1px solid #334155;color:var(--dim);padding:4px 10px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;z-index:100}
#sound-toggle:hover{color:var(--cyan)}
.glow{box-shadow:0 0 40px var(--glow),0 0 80px rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.1);border-radius:8px;padding:16px;height:100%;display:flex;flex-direction:column}
#matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.ascii-art{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;margin:2px 0}
.ascii-line{white-space:pre;min-width:max-content}

/* === MOBILE === */
@media(max-width:768px){
  html,body{font-size:13px;overflow:auto;-webkit-overflow-scrolling:touch}
  #terminal-wrapper{height:auto;min-height:100vh;min-height:100dvh;padding:8px}
  .glow{padding:10px;border-radius:0;box-shadow:none;border:none;border-top:none;height:auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
  #output{flex:1;overflow-y:auto;min-height:0;padding-bottom:8px}
  #mobile-cmds{display:block}
  #input-area{position:sticky;bottom:0;background:var(--bg);padding:10px 0;z-index:10;border-top:1px solid #1e293b}
  #sound-toggle{top:6px;right:6px;padding:3px 8px;font-size:11px}
  .line{font-size:12px}
  #prompt{font-size:11px}
  #input{font-size:14px}
  .ascii-art{overflow-x:scroll;margin:4px -10px;padding:0 10px}
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1s step-end infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease-out}
</style>

// Audio context for click sound
let audioCtx;
function playClick(){
  if(!soundOn)return;
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=800+Math.random()*400;g.gain.value=0.03;
    o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.05);
    o.stop(audioCtx.currentTime+0.05);
  }catch(e){}
}
function toggleSound(){
  soundOn=!soundOn;

}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function printAscii(text,colorClass='cyan'){
  const wrapper=document.createElement('div');
  wrapper.className='ascii-art';
  const lines=text.split('\n');
  for(const line of lines){
    const d=document.createElement('div');
    d.className='ascii-line line fade-in';
    if(colorClass)d.classList.add(colorClass);
    d.textContent=line;
    wrapper.appendChild(d);
  }
  output.appendChild(wrapper);
  output.scrollTop=output.scrollHeight;
}

  }
}

async function typePrint(text,speed=12){
  typing=true;
  const hasHTML=/<[a-z]/.test(text);
  const d=document.createElement('div');d.className='line fade-in';
  output.appendChild(d);
  if(hasHTML){
    // Render HTML progressively by revealing characters
    const tmp=document.createElement('div');tmp.innerHTML=text;
    const plain=tmp.textContent;
    for(let i=0;i<=plain.length;i++){
      // Find how many raw HTML chars correspond to i plain chars
      let rawIdx=0,plainCount=0;
      while(rawIdx<text.length && plainCount<i){
        if(text[rawIdx]==='<'){while(rawIdx<text.length && text[rawIdx-1]!=='>')rawIdx++;}
        else{plainCount++;rawIdx++;}
      }
      d.innerHTML=text.substring(0,rawIdx);
      output.scrollTop=output.scrollHeight;
      await sleep(speed);
    }
  }else{
    for(let i=0;i<text.length;i++){
      d.innerHTML=esc(text.substring(0,i+1));
      output.scrollTop=output.scrollHeight;
      await sleep(speed);
    }
  }
  typing=false;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function switchTheme(name){
  const t=themes[name];if(!t)return;
  document.documentElement.style.setProperty('--cyan',t.cyan);
  document.documentElement.style.setProperty('--glow',t.glow);
  document.documentElement.style.setProperty('--prompt-color',t.prompt);
  currentTheme=name;
}

  matrix:()=>{
    const canvas=document.getElementById('matrix-canvas');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    canvas.style.display='block';
    const cols=Math.floor(canvas.width/14);
    const drops=Array(cols).fill(0);
    const chars='アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF';
    let frame=0;
    const draw=()=>{
      ctx.fillStyle='rgba(10,10,10,0.08)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='#22d3ee';
      ctx.font='14px monospace';
      for(let i=0;i<drops.length;i++){
        const t=chars[Math.floor(Math.random()*chars.length)];
        ctx.fillStyle=Math.random()>0.95?'#fff':'#22d3ee';
        ctx.fillText(t,i*14,drops[i]*14);
        if(drops[i]*14>canvas.height&&Math.random()>0.975)drops[i]=0;
        drops[i]++;
      }
      frame++;
      if(frame<80)requestAnimationFrame(draw);
      else canvas.style.display='none';
    };
    draw();
    print('<span class="green">[matrix] Wake up, Neo...</span>');
  },

function openProject(name){
  const p=projects[name];
  if(!p){
    print(`<span class="red">Project "${esc(name)}" not found. Type </span><span class="cyan">projects</span><span class="red"> to list all.</span>`);
    return;
  }
  printRaw('');
  printProjectTitle(name);
  printRaw('');
  print(`<span class="dim">${'─'.repeat(isMobile()?30:40)}</span>`);
  printRaw('');
  print(`  <span class="cyan">Project:</span> ${p.name}`);
  printRaw('');
  print(`  <span class="cyan">Description:</span>`);
  print(`  <span class="dim">${esc(p.desc)}</span>`);
  printRaw('');
  print(`  <span class="cyan">Tech Stack:</span>`);
  let badges=p.stack.map(s=>`<span class="badge">${s}</span>`).join(' ');
  print(`  ${badges}`);
  printRaw('');
  print(`  <span class="cyan">Link:</span> <a href="${p.link}" target="_blank">${p.link}</a>`);
  printRaw('');
  print(`<span class="dim">${'─'.repeat(isMobile()?30:40)}</span>`);
  printRaw('');
}

function processCmd(raw){
  const cmd=raw.trim();
  if(!cmd)return;
  history.push(cmd);histIdx=history.length;
  printPrompt(cmd);

  if(cmd.startsWith('open ')){
    openProject(cmd.slice(5).trim());
    return;
  }
  if(cmds[cmd]){cmds[cmd]();}
  else{
    print(`<span class="red">Command not found: ${esc(cmd)}</span>`);
    print(`<span class="dim">Type </span><span class="cyan">help</span><span class="dim"> for available commands.</span>`);
  }
}

function runCmd(cmd){input.value=cmd;processCmd(cmd);input.value='';}

input.addEventListener('keydown',e=>{
  playClick();
  if(e.key==='Enter'){processCmd(input.value);input.value='';}
  else if(e.key==='Tab'){
    e.preventDefault();
    const v=input.value.trim().toLowerCase();
    const match=allCmds.filter(c=>c.startsWith(v));
    if(match.length===1)input.value=match[0];
    else if(match.length>1){
      print(`<span class="dim">${match.join('  ')}</span>`);
    }
  }
  else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(histIdx>0){histIdx--;input.value=history[histIdx];}
  }
  else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(histIdx<history.length-1){histIdx++;input.value=history[histIdx];}
    else{histIdx=history.length;input.value='';}
  }
});

// Focus input on tap, but not when selecting text
document.addEventListener('click',(e)=>{
  if(!typing && !window.getSelection().toString()){
    if(!isMobile() || e.target.closest('#input-area') || e.target.closest('#mobile-cmds')){
      input.focus();
    }
  }
});
